<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- ============================== -->
    <!-- 📌 META CONFIGURACIÓN -->
    <!-- ============================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================== -->
    <!-- 🏷️ TÍTULO DE LA APLICACIÓN -->
    <!-- ============================== -->
    <title>SIVACAD | ISC | TESI</title>

    <!-- ============================== -->
    <!-- 🌐 FAVICON -->
    <!-- ============================== -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- ============================== -->
    <!-- 🌙 CONFIGURACIÓN DE MODO OSCURO -->
    <!-- ============================== -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('sivacad_theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (error) {
          console.warn('Error al aplicar tema:', error);
        }
      })();
    </script>
  </head>

  <body>
    <!-- ============================== -->
    <!-- ⚛️ ROOT DE REACT -->
    <!-- ============================== -->
    <div id="root"></div>

    <!-- ============================== -->
    <!-- 🚀 SCRIPT PRINCIPAL (VITE / REACT) -->
    <!-- ============================== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
